<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GRAMKENDRA COMPUTERS Form</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f5f7;
    margin: 0;
    padding: 0;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    background: #e3f2fd;
    border-bottom: 3px solid #0d47a1;
    padding: 15px 30px;
}

.header .logo img {
    height: 70px;
}

.header .center-text {
    text-align: center;
    flex-grow: 1;
    margin-left: 20px;
}

.header .center-text h2 {
    margin: 0;
    font-size: 26px;
    color: #0d47a1;
    font-weight: bold;
}

.header .center-text p {
    margin: 2px 0;
    font-size: 14px;
    color: #000;
}

.header .center-text .branch {
    margin-top: 5px;
    font-weight: bold;
    color: #b71c1c;
}

.header .right-text {
    text-align: right;
    font-size: 14px;
}

.header .right-text p {
    margin: 2px 0;
}

/* Form Container */
form {
    background: #fff;
    max-width: 750px;
    margin: 30px auto;
    padding: 30px 25px;
    border-radius: 8px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
    border: 1px solid #ccc;
}

/* Section Header */
form h3 {
    background-color: #0d47a1;
    color: #fff;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 15px;
    font-size: 16px;
}

/* Form Fields */
form label {
    display: block;
    font-weight: bold;
    margin-top: 10px;
    font-size: 13px;
}

form input, form select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #999;
    font-size: 14px;
    box-sizing: border-box;
}

form input[type="file"] {
    padding: 3px;
}

form button {
    background-color: #0d47a1;
    color: #fff;
    padding: 12px;
    margin-top: 20px;
    border: none;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

form button:hover {
    background-color: #1565c0;
}

</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        <img src="logo.png" alt="MORAL GROUP Logo">
    </div>
    <div class="center-text">
        <h2>GRAMKENDRA COMPUTERS </h2>
        <p>Gramkendra Computers Pakribarawan</p>
        <p>Near PHC Hospital More, Dakbangla Side</p>
        <p>Nawada, Bihar - 805124</p>
        <p class="branch">Branch Code: FR1338</p>
        <h3>MCCSL</h3>
    </div>
    <div class="right-text">
        <p><b>Name:</b> Rahul Chouhan</p>
        <p><b>Contact No:</b> +918084866606</p>
    </div>
</div>

<!-- Form -->
<form id="myForm">
    <h3>Member Details</h3>
    <label for="memberId">Member ID</label>
    <input type="text" name="memberId" id="memberId" required>

    <label for="name">Name</label>
    <input type="text" name="name" id="name" required>

    <label for="address">Address</label>
    <input type="text" name="address" id="address" required>

    <label for="mobile">Mobile No</label>
    <input type="text" name="mobile" id="mobile" required>

    <label for="date">Date</label>
    <input type="date" name="date" id="date" required>

    <h3>Account Details</h3>
    <label for="accountNo">Account No</label>
    <input type="text" name="accountNo" id="accountNo" required>

    <label for="txnId">TXN ID</label>
    <input type="text" name="txnId" id="txnId">

    <label for="planName">Plan Name</label>
    <input type="text" name="planName" id="planName">

    <label for="amount">Amount</label>
    <input type="number" name="amount" id="amount" required>

    <h3>Agent Details</h3>
    <label for="agentId">Agent ID</label>
    <input type="text" name="agentId" id="agentId">

    <label for="agentName">Agent Name</label>
    <input type="text" name="agentName" id="agentName">

    <label for="fileInput">Upload Document</label>
    <input type="file" id="fileInput">

    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("myForm").addEventListener("submit", function(e){
    e.preventDefault();
    const file = document.getElementById("fileInput").files[0];
    const reader = new FileReader();

    reader.onloadend = function() {
        const base64File = reader.result ? reader.result.split(",")[1] : "";

        const data = {
            memberId: document.getElementById("memberId").value,
            name: document.getElementById("name").value,
            address: document.getElementById("address").value,
            mobile: document.getElementById("mobile").value,
            date: document.getElementById("date").value,
            accountNo: document.getElementById("accountNo").value,
            txnId: document.getElementById("txnId").value,
            planName: document.getElementById("planName").value,
            amount: document.getElementById("amount").value,
            agentId: document.getElementById("agentId").value,
            agentName: document.getElementById("agentName").value,
            file: base64File,
            fileName: file ? file.name : "",
            fileType: file ? file.type : ""
        };

        fetch("https://script.google.com/macros/s/AKfycby2K4NotisYFrJlfksca5D4mx-gtIunTR3o17ECsD_w_zV7KZzhoie-HAzR-dr35tf8/exec", {
            method:"POST",
            body: JSON.stringify(data)
        }).then(res => {
            alert("Data Submitted Successfully");
            document.getElementById("myForm").reset();
        }).catch(err => alert("Error: "+err));
    };

    if(file) reader.readAsDataURL(file);
    else reader.onloadend();
});
</script>

</body>
</html>
